<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Order History</h2>
    <form th:action="@{/order/history}" method="post">
        <div class="form-group">
            <label for="historyAuthorInput">Author</label>
            <input id="historyAuthorInput" name="author" class="form-control col-4" type="text" placeholder="Input author name">
        </div>
        <button class="btn btn-primary" type="submit">Search</button>
    </form>

    <table th:if="${orders != null}" class="table table-striped mt-4">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Author</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.author}"></td>
            <td th:text="${order.status}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
