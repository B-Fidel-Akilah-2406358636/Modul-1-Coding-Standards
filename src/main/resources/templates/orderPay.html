<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Pay Order</h2>
    <p th:text="'Order ID: ' + ${order.id}"></p>
    <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
        <div class="form-group">
            <label for="methodInput">Method</label>
            <select id="methodInput" name="method" class="form-control col-4">
                <option value="Voucher Code">Voucher Code</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>
        </div>
        <div class="form-group">
            <label for="voucherCodeInput">Voucher Code</label>
            <input id="voucherCodeInput" name="voucherCode" class="form-control col-4" type="text">
        </div>
        <div class="form-group">
            <label for="bankNameInput">Bank Name</label>
            <input id="bankNameInput" name="bankName" class="form-control col-4" type="text">
        </div>
        <div class="form-group">
            <label for="referenceCodeInput">Reference Code</label>
            <input id="referenceCodeInput" name="referenceCode" class="form-control col-4" type="text">
        </div>
        <button class="btn btn-primary" type="submit">Pay</button>
    </form>
</div>
</body>
</html>
